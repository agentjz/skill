<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>开发前用的 Skill</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #111827;
        --muted: #64748b;
        --line: #e5e7eb;
        --paper: #ffffff;
        --soft: #f8fafc;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
      }

      body {
        min-height: 100vh;
        background: var(--soft);
        color: var(--ink);
        display: flex;
        flex-direction: column;
      }

      .site-shell {
        max-width: 1120px;
      }

      .hero {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 250, 252, 0.98)),
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 32rem);
        border-bottom: 1px solid var(--line);
      }

      .hero-title {
        max-width: 820px;
        letter-spacing: 0;
      }

      .hero-copy {
        max-width: 760px;
        color: var(--muted);
        line-height: 1.8;
      }

      .template-section {
        border: 1px solid var(--line);
        background: var(--paper);
      }

      .accordion-button {
        gap: 0.75rem;
      }

      .accordion-button:not(.collapsed) {
        background: #eff6ff;
        color: var(--brand-dark);
      }

      .template-path {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8125rem;
      }

      .source-box {
        width: 100%;
        min-height: 360px;
        border: 1px solid var(--line);
        border-radius: 0.75rem;
        background: #ffffff;
        color: #111827;
        padding: 1rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.875rem;
        line-height: 1.65;
        resize: vertical;
      }

      .source-wrap {
        position: relative;
      }

      .source-copy {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        background: rgba(255, 255, 255, 0.92);
      }

      @media (max-width: 575.98px) {
        .hero .btn {
          width: 100%;
        }

        .template-section .p-4 {
          padding: 1rem !important;
        }

        .source-box {
          min-height: 300px;
          font-size: 0.8125rem;
        }
      }

      .footer-icon-button {
        width: 4rem;
        height: 3.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #111827;
        border-radius: 0.5rem;
        background: #ffffff;
        color: #111827;
        font-size: 1.45rem;
        text-decoration: none;
      }

      .footer-icon-button:hover,
      .footer-icon-button:focus {
        border-color: #111827;
        background: #f8fafc;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <main class="container site-shell py-4 py-md-5 flex-grow-1">
      <section id="templates" class="template-section rounded-4 overflow-hidden">
        <div class="accordion accordion-flush" id="templateAccordion"></div>
      </section>
    </main>

    <footer class="border-top bg-white">
      <div class="container site-shell py-4">
        <div class="d-flex justify-content-center align-items-center gap-2">
          <a class="footer-icon-button" href="https://github.com/agentjz/skill" target="_blank" rel="noreferrer" aria-label="GitHub">
            <i class="bi bi-github"></i>
          </a>
          <a class="footer-icon-button" href="downloads/skill.zip" aria-label="下载">
            <i class="bi bi-download"></i>
          </a>
        </div>
      </div>
    </footer>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div class="toast align-items-center text-bg-dark border-0" id="toast" role="status" aria-live="polite">
        <div class="d-flex">
          <div class="toast-body" id="toastBody">已复制</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const templates = [
        ['Skill 使用入口', 'skill.md', '新项目开始前先读这个文件。'],
        ['AGENTS.md', 'AGENTS.md', '项目最高工作规约模板。'],
        ['spec.md', 'spec.md', '当前产品事实和边界模板。'],
        ['plan.example.md', 'plan.example.md', '任务计划模板。'],
        ['Project Development Skill', '.codex/skills/project-development/SKILL.md', '项目级开发 skill 模板。'],
        ['Plan Skill', '.codex/skills/plan/SKILL.md', 'plan.md 写作和执行 skill 模板。'],
        ['CONTRIBUTING.md', 'CONTRIBUTING.md', '英文贡献规范模板。'],
        ['SECURITY.md', 'SECURITY.md', '英文安全说明模板。'],
        ['LICENSE', 'LICENSE', 'MIT 协议模板。'],
        ['.gitignore', '.gitignore', '通用忽略规则模板。'],
      ];

      const cache = new Map();
      const accordion = document.getElementById('templateAccordion');
      const toast = new bootstrap.Toast(document.getElementById('toast'));
      const toastBody = document.getElementById('toastBody');

      function showToast(message) {
        toastBody.textContent = message;
        toast.show();
      }

      function escapeHtml(value) {
        return value
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      async function loadText(path) {
        if (cache.has(path)) return cache.get(path);
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        cache.set(path, text);
        return text;
      }

      async function copyTemplate(path) {
        const text = await loadText(path);
        await navigator.clipboard.writeText(text);
        showToast('已复制模板原文');
      }

      async function fillSource(path, targetId) {
        const target = document.getElementById(targetId);
        if (!target || target.dataset.loaded === 'true') return;

        target.value = '正在读取...';
        try {
          target.value = await loadText(path);
        } catch (error) {
          target.value = [
            '无法读取模板文件。',
            '',
            '如果你是直接双击打开 index.html，浏览器可能会限制本地文件读取。',
            '可以在本目录运行：python -m http.server 8000',
            '然后访问：http://127.0.0.1:8000',
            '',
            `错误：${error.message}`,
          ].join('\n');
        }
        target.dataset.loaded = 'true';
      }

      templates.forEach(([title, path, description], index) => {
        const itemId = `template-${index}`;
        const sourceId = `source-${index}`;
        const wrapper = document.createElement('div');
        wrapper.className = 'accordion-item';
        wrapper.innerHTML = `
          <h3 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#${itemId}">
              <i class="bi bi-file-earmark-text"></i>
              <span>
                <span class="d-block fw-semibold">${escapeHtml(title)}</span>
                <span class="template-path">${escapeHtml(path)}</span>
              </span>
            </button>
          </h3>
          <div id="${itemId}" class="accordion-collapse collapse" data-bs-parent="#templateAccordion">
            <div class="accordion-body">
              <p class="text-secondary">${escapeHtml(description)}</p>
              <div class="source-wrap">
                <button class="btn btn-sm btn-light border source-copy" type="button" data-copy="${escapeHtml(path)}" aria-label="复制">
                  <i class="bi bi-copy"></i>
                </button>
                <textarea class="source-box" id="${sourceId}" spellcheck="false"></textarea>
              </div>
            </div>
          </div>
        `;
        accordion.appendChild(wrapper);
        document.getElementById(itemId).addEventListener('shown.bs.collapse', () => fillSource(path, sourceId));
      });

      accordion.addEventListener('click', (event) => {
        const copyPath = event.target.closest('[data-copy]')?.dataset.copy;
        if (copyPath) copyTemplate(copyPath);
      });
    </script>
  </body>
</html>
